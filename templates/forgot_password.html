{% extends 'base.html' %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="form-page">
    <div class="page-card">
        <h2>Forgot Password</h2>
        <p>Please enter your email and we will send reset instructions.</p>
        <form action="/forgot_password" method="POST">
            <input type="email" name="email" placeholder="Enter your email" required>
            <button type="submit">Send Reset Link</button>
        </form>
        <p class="small-text">Remembered your password? <a class="link" href="/">Sign In</a></p>
    </div>
</div>
{% endblock %}
