runtime: python39
entrypoint: gunicorn -b :$PORT app:app

instance_class: F1

handlers:
- url: /static
  static_dir: static
- url: /.*
  script: auto

env_variables:
  SECRET_KEY: "your_secret_key"
  MONGO_URI: "mongodb://<username>:<password>@cluster0.mongodb.net/loan_default_prediction?retryWrites=true&w=majority"
